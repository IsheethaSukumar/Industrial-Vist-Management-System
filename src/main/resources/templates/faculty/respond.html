<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Responsibility Response</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    .card { max-width: 600px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h2 { margin-top: 0; color: #0f62fe; font-size: 24px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
    .detail-item { margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
    .label { font-weight: 600; color: #475569; font-size: 13px; text-transform: uppercase; }
    .value { font-size: 16px; margin-top: 3px; }
    .btn-group { display: flex; gap: 15px; margin-top: 25px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px; }
    .btn-approve { background: #198754; color: white; }
    .btn-approve:hover { background: #157347; }
    .btn-reject { background: #dc3545; color: white; }
    .btn-reject:hover { background: #bb2d3b; }
  </style>
</head>
<body>
<div class="card">
  <h2>Faculty In-Charge Assignment Response</h2>
  <p>You have been assigned as the Faculty In-Charge for this Industrial Visit:</p>
  
  <div class="detail-item">
    <div class="label">IV ID</div>
    <div class="value" th:text="${iv.id}">1</div>
  </div>
  <div class="detail-item">
    <div class="label">Target Company</div>
    <div class="value" th:text="${iv.company != null ? iv.company.name : '—'}">Google</div>
  </div>
  <div class="detail-item">
    <div class="label">Visit Date</div>
    <div class="value" th:text="${iv.tentativeDateTime}">2026-07-10T10:00</div>
  </div>
  <div class="detail-item">
    <div class="label">Number of Students</div>
    <div class="value" th:text="${iv.studentLimit}">50</div>
  </div>

  <form th:action="@{'/web/faculty/iv/' + ${iv.id} + '/respond'}" method="post">
    <div class="btn-group">
      <button class="btn btn-approve" type="submit" name="action" value="ACCEPT">Accept Responsibility</button>
      <button class="btn btn-reject" type="submit" name="action" value="DECLINE">Decline / Reject</button>
    </div>
  </form>
</div>
</body>
</html>
