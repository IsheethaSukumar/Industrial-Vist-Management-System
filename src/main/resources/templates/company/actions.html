<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Actions</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f7f7f7;margin:0}
    .card{max-width:700px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    label{display:block;margin-top:12px}
    input,textarea{width:100%;padding:8px;margin-top:4px}
    button{margin-top:16px;background:#0f62fe;color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
    h3{margin-top:24px}
    a{display:inline-block;margin-top:10px}
  </style>
</head>
<body>
<div class="card">
  <h2>Company Actions</h2>
  <h3>Confirm/Suggest Date</h3>
  <form action="/web/company/confirm-date" method="post">
    <label>IV ID
      <input type="number" name="ivId" required>
    </label>
    <label>Date-Time (ISO)
      <input type="text" name="dateTime" placeholder="2025-11-11T11:00:00" required>
    </label>
    <button type="submit">Confirm Date</button>
  </form>

  <h3>Set Student Limit</h3>
  <form action="/web/company/student-limit" method="post">
    <label>IV ID
      <input type="number" name="ivId" required>
    </label>
    <label>Limit
      <input type="number" name="limit" min="1" required>
    </label>
    <button type="submit">Set Limit</button>
  </form>

  <a href="/">Back</a>
</div>
</body>
</html>
