<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company IV Requests</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f7f7f7;margin:0}
    .card{max-width:1000px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #eee;padding:8px;text-align:left}
    th{background:#fafafa}
    a{color:#0f62fe;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <h2>IV Requests for Your Company</h2>
  <p>Company ID: <span th:text="${companyId}">1</span></p>
  <table>
    <thead>
      <tr>
        <th>IV ID</th>
        <th>CR</th>
        <th>Tentative Date</th>
        <th>Status</th>
        <th>Student Limit</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="iv : ${ivs}">
        <td th:text="${iv.id}">1</td>
        <td th:text="${iv.cr != null ? iv.cr.name : '-'}">CR Name</td>
        <td th:text="${iv.tentativeDateTime}">2025-11-10T10:00</td>
        <td th:text="${iv.status}">APPROVAL_IN_PROGRESS</td>
        <td th:text="${iv.studentLimit}">40</td>
        <td>
          <a th:href="@{'/web/company/iv/' + ${iv.id}}" style="margin-right: 10px;">Details</a>
          <a th:if="${iv.status == 'COMPANY_REQUESTED'}" th:href="@{'/web/company/iv/' + ${iv.id} + '/confirm'}" style="background: #198754; color: white; padding: 4px 8px; border-radius: 4px; text-decoration: none;">Respond/Confirm</a>
        </td>
      </tr>
    </tbody>
  </table>
  <div style="margin-top: 20px;">
    <a th:href="@{'/web/company/' + ${companyId} + '/dashboard'}" style="background: #0f62fe; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; display: inline-block; font-weight: 600;">Back to Dashboard</a>
    <a href="javascript:history.back()" style="display: inline-block; margin-left: 15px; color: #0f62fe;">← Back</a>
  </div>
</div>
</body>
</html>
