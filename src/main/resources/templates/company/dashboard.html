<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Dashboard</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f7f7f7;margin:0}
    .card{max-width:900px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    ul{line-height:1.9}
    a{color:#0f62fe;text-decoration:none}
    .info{margin-bottom:12px;color:#555}
  </style>
</head>
<body>
<div class="card">
  <h2>Company Dashboard</h2>
  <p class="info">Logged in as <span th:text="${company.hrEmail}">hr@example.com</span> - <span th:text="${company.name}">Company</span></p>
  <ul>
    <li><a href="/web/company/actions">Manage Company Actions</a> (Date, Student Limit)</li>
    <li><a th:href="@{'/web/company/' + ${company.id} + '/ivs'}">View IV Requests</a></li>
  </ul>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
