<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Post-IV Proof</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    .card { max-width: 600px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h2 { margin-top: 0; color: #0f62fe; font-size: 24px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    textarea { height: 80px; resize: vertical; }
    button { background: #198754; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; transition: background 0.2s; }
    button:hover { background: #157347; }
    .muted { color: #64748b; font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>
<div class="card">
  <h2>Upload Post-IV Proof (IV ID: <span th:text="${iv.id}">1</span>)</h2>
  
  <form th:action="@{'/web/cr/iv/' + ${iv.id} + '/proof'}" method="post">
    
    <div class="form-group">
      <label for="proofPhotosPath">Visit Photographs (Mock URL/Path)</label>
      <input type="text" id="proofPhotosPath" name="proofPhotosPath" required placeholder="e.g. /images/iv-photos-group.jpg">
      <div class="muted">Provide a path or URL of the group photo.</div>
    </div>

    <div class="form-group">
      <label for="proofAttendancePath">Attendance Sheet (Mock URL/Path)</label>
      <input type="text" id="proofAttendancePath" name="proofAttendancePath" required placeholder="e.g. /docs/attendance_sheet.pdf">
      <div class="muted">Upload attendance sheet showing present students.</div>
    </div>

    <div class="form-group">
      <label for="proofReportPath">Visit Report / Feedback Document (Optional)</label>
      <input type="text" id="proofReportPath" name="proofReportPath" placeholder="e.g. /docs/visit_report.pdf">
    </div>

    <div class="form-group">
      <label for="proofFeedback">General Feedback & Notes</label>
      <textarea id="proofFeedback" name="proofFeedback" placeholder="Enter general visit feedback, observations, etc."></textarea>
    </div>

    <button type="submit">Upload Proof & Submit for Verification</button>
  </form>
</div>
</body>
</html>
