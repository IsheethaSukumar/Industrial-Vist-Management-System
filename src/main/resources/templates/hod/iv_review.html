<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOD IV Review</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f7f7f7;margin:0}
    .card{max-width:900px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .muted{color:#666}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border:1px solid #eee;padding:8px;text-align:left}
    th{background:#fafafa}
    form{margin-top:16px}
    input,select,textarea{padding:8px;margin:4px 0;width:100%;box-sizing:border-box}
    button{padding:8px 12px}
  </style>
</head>
<body>
<div class="card">
  <h2>IV Review</h2>
  <div th:if="${iv != null}">
    <p><strong>IV ID:</strong> <span th:text="${iv.id}">1</span></p>
    <p><strong>CR:</strong> <span th:text="${iv.cr != null ? iv.cr.rollNo : '—'}">CR</span></p>
    <p><strong>Company:</strong> <span th:text="${iv.company != null ? iv.company.name : '—'}">Company</span></p>
    <p><strong>Tentative Date/Time:</strong> <span th:text="${iv.tentativeDateTime}">2025-11-10T10:00:00</span></p>
    <p><strong>Invited Staff:</strong> <span th:text="${iv.invitedStaff}">staff1,hod</span></p>
    <p><strong>Status:</strong> <span th:text="${iv.status}">APPROVAL_IN_PROGRESS</span></p>
    <p><strong>Student Limit:</strong> <span th:text="${iv.studentLimit}">40</span></p>
    <p><strong>Transport:</strong> <span th:text="${iv.transportDetails}">2 buses</span></p>
  </div>

  <div th:if="${approval != null}">
    <h3>HOD Approval</h3>
    <p class="muted">Approval ID: <span th:text="${approval.id}">10</span> | Status: <strong th:text="${approval.status}">PENDING</strong></p>
    <form method="post" action="/web/staff/approve">
      <input type="hidden" name="approvalId" th:value="${approval.id}" />
      <label>Approver Name</label>
      <input type="text" name="approverName" placeholder="Your name" required />
      <label>Action</label>
      <select name="status">
        <option value="APPROVED">APPROVE</option>
        <option value="REJECTED">REJECT</option>
      </select>
      <label>Remarks</label>
      <textarea name="remarks" rows="3" placeholder="Optional remarks..."></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>

  <div th:if="${iv != null}">
    <h3>Mark as Completed</h3>
    <form th:action="@{'/web/hod/iv/' + ${iv.id} + '/complete'}" method="post">
      <label>Attended Notes / Details</label>
      <textarea name="notes" rows="3" placeholder="Summary, observations, attachments path, etc."></textarea>
      <button type="submit">Mark Completed</button>
    </form>
  </div>

  <a href="/web/hod/ivs">Back to All IV Requests</a>
  <a href="/web/hod/login">HOD Dashboard</a>
  <a href="/">Home</a>
</div>
</body>
</html>
