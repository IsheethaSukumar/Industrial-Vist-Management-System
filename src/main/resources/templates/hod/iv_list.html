<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All IV Requests</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f7f7f7;margin:0}
    .card{max-width:1100px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #eee;padding:8px;text-align:left}
    th{background:#fafafa}
    .muted{color:#666}
    a{display:inline-block;margin-top:10px}
  </style>
</head>
<body>
<div class="card">
  <h2>All IV Requests</h2>
  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>CR</th>
      <th>Company</th>
      <th>Tentative Date/Time</th>
      <th>Invited Staff</th>
      <th>Status</th>
      <th>Student Limit</th>
      <th>Transport</th>
      <th>Review</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="iv : ${ivs}">
      <td th:text="${iv.id}">1</td>
      <td th:text="${iv.cr != null ? iv.cr.rollNo : '—'}">CR</td>
      <td th:text="${iv.company != null ? iv.company.name : '—'}">Company</td>
      <td th:text="${iv.tentativeDateTime}">2025-11-10T10:00:00</td>
      <td th:text="${iv.invitedStaff}">staff1,hod</td>
      <td th:text="${iv.status}">APPROVAL_IN_PROGRESS</td>
      <td th:text="${iv.studentLimit}">40</td>
      <td th:text="${iv.transportDetails}">2 buses</td>
      <td><a th:href="@{'/web/hod/iv/' + ${iv.id}}">Review</a></td>
    </tr>
    </tbody>
  </table>
  <a href="/web/hod/login">Back to HOD Login</a>
  <a href="/">Home</a>
</div>
</body>
</html>
