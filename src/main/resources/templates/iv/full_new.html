<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create IV - Full</title>
  <!-- Toastr for notifications -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
  <style>
    body{font-family:Arial, sans-serif;background:#f7f7f7;margin:0}
    .card{max-width:800px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    label{display:block;margin-top:12px;font-weight:500}
    input,select,textarea{width:100%;padding:8px;margin-top:4px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box}
    textarea{min-height:100px;resize:vertical}
    button{margin-top:16px;background:#0f62fe;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;transition:background-color 0.2s}
    button:hover{background:#0353e9}
    button:disabled{background:#ccc;cursor:not-allowed}
    a{display:inline-block;margin-top:10px;color:#0f62fe;text-decoration:none}
    a:hover{text-decoration:underline}
    .error-message{color:#dc3545;font-size:0.875em;margin-top:4px;display:none}
    .is-invalid{border-color:#dc3545 !important}
    .form-group{margin-bottom:12px}
    .muted{color:#666;font-size:0.9em}
  </style>
</head>
<body>
<div class="card">
  <h2>Create IV (Full)</h2>
  <div id="errorContainer" class="error-message"></div>
  <form id="ivForm" action="/web/iv/full-create" method="post" onsubmit="return validateForm()">
    <label>Class Representative
      <select name="crId" required>
        <option value="" disabled selected>Select CR</option>
        <option th:each="c : ${crs}" th:value="${c.id}" th:text="${c.name} + ' (' + ${c.rollNo} + ')'">CR</option>
      </select>
    </label>
    <label>Company
      <select name="companyId" required>
        <option value="" disabled selected>Select Company</option>
        <option th:each="co : ${companies}" th:value="${co.id}" th:text="${co.name} + ' - ' + ${co.location}">Company</option>
      </select>
    </label>
    <div class="form-group">
      <label>Invited Staff (comma separated emails)
        <input type="text" name="invitedStaff" id="invitedStaff" placeholder="staff1@clg.com, hod@clg.com">
        <div id="emailError" class="error-message"></div>
        <div class="muted">Enter valid email addresses separated by commas</div>
      </label>
    </div>
    <div class="form-group">
      <label>Tentative Date & Time
        <input type="datetime-local" name="dateTime" id="dateTime" required>
        <div id="dateError" class="error-message"></div>
        <div class="muted">Select a future date and time</div>
      </label>
    </div>
    <label>Transport Details
      <input type="text" name="transportDetails" placeholder="2 buses, start 07:00 AM">
    </label>
    <label>Students (one per line: name,rollNo,dept)
      <textarea name="studentsText" placeholder="Student A,21CS001,CSE&#10;Student B,21CS002,CSE"></textarea>
    </label>
    <button type="submit" id="submitBtn">Create IV</button>
  </form>
  <a href="/">Back</a>
</div>

<!-- JavaScript for form validation -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/js/toastr.min.js"></script>
<script>
  // Set min datetime to current time
  document.addEventListener('DOMContentLoaded', function() {
    const now = new Date();
    // Add 1 hour buffer to current time
    now.setHours(now.getHours() + 1);
    const minDateTime = now.toISOString().slice(0, 16);
    document.getElementById('dateTime').min = minDateTime;
    
    // Display any server-side errors
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    if (error) {
      toastr.error(decodeURIComponent(error), 'Error');
    }
  });

  function validateForm() {
    let isValid = true;
    const form = document.getElementById('ivForm');
    const errorContainer = document.getElementById('errorContainer');
    const submitBtn = document.getElementById('submitBtn');
    
    // Reset previous errors
    errorContainer.style.display = 'none';
    errorContainer.innerHTML = '';
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
    document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
    
    // Validate invited staff emails
    const invitedStaff = document.getElementById('invitedStaff');
    if (invitedStaff.value.trim()) {
      const emails = invitedStaff.value.split(',').map(email => email.trim());
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const invalidEmails = emails.filter(email => !emailRegex.test(email));
      
      if (invalidEmails.length > 0) {
        showError(invitedStaff, 'emailError', 'Invalid email format: ' + invalidEmails.join(', '));
        isValid = false;
      }
    }
    
    // Validate date-time
    const dateTime = document.getElementById('dateTime');
    if (!dateTime.value) {
      showError(dateTime, 'dateError', 'Date and time are required');
      isValid = false;
    } else {
      const selectedDate = new Date(dateTime.value);
      const now = new Date();
      
      if (selectedDate <= now) {
        showError(dateTime, 'dateError', 'Please select a future date and time');
        isValid = false;
      }
    }
    
    // Validate students format
    const studentsText = document.querySelector('textarea[name="studentsText"]');
    if (studentsText.value.trim()) {
      const lines = studentsText.value.trim().split('\n');
      const invalidLines = [];
      
      lines.forEach((line, index) => {
        const parts = line.split(',').map(part => part.trim());
        if (parts.length < 3 || !parts[0] || !parts[1] || !parts[2]) {
          invalidLines.push(index + 1);
        }
      });
      
      if (invalidLines.length > 0) {
        showError(studentsText, null, `Invalid student format on line(s): ${invalidLines.join(', ')}. Format: name,rollNo,dept`);
        isValid = false;
      }
    }
    
    if (!isValid) {
      errorContainer.style.display = 'block';
      errorContainer.innerHTML = 'Please fix the errors in the form';
      errorContainer.scrollIntoView({ behavior: 'smooth' });
      return false;
    }
    
    // Show loading state
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Creating IV...';
    
    return true;
  }
  
  function showError(input, errorId, message) {
    if (input) input.classList.add('is-invalid');
    if (errorId) {
      const errorElement = document.getElementById(errorId);
      if (errorElement) {
        errorElement.textContent = message;
        errorElement.style.display = 'block';
      }
    } else {
      const errorContainer = document.getElementById('errorContainer');
      errorContainer.innerHTML += `<div>• ${message}</div>`;
      errorContainer.style.display = 'block';
    }
  }
  
  // Add input event listeners to clear error state when user starts typing
  document.querySelectorAll('input, textarea').forEach(input => {
    input.addEventListener('input', function() {
      if (this.classList.contains('is-invalid')) {
        this.classList.remove('is-invalid');
      }
      const errorId = this.id ? this.id + 'Error' : null;
      if (errorId) {
        const errorElement = document.getElementById(errorId);
        if (errorElement) errorElement.style.display = 'none';
      }
    });
  });
</script>
</body>
</html>
